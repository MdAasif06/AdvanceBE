services:
  nginx:
    image: nginx
    ports:
      - 8000:80
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf

  server1:
    build: ./server
    env_file:
      - ./server/.env
    environment:
      - SERVER_NAME=pahla server
    ports:
      - 5001:700

  server2:
    build: ./server
    env_file:
      - ./server/.env
    environment:
      - SERVER_NAME=dusra server
    ports:
      - 5002:700

  server3:
    build: ./server
    env_file:
      - ./server/.env
    environment:
      - SERVER_NAME=teesra server
    ports:
      - 5003:700
